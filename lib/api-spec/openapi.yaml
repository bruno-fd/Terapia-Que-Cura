openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: blog
    description: Public blog operations
  - name: admin-blog
    description: Admin blog generation and management
  - name: subscription
    description: Psychologist subscription billing via Asaas
  - name: psychologist
    description: Psychologist profile and public directory
  - name: cadastro
    description: Progressive psychologist registration funnel (lead capture)
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /blog/posts:
    get:
      operationId: listPublishedPosts
      tags: [blog]
      summary: List published blog posts
      description: Returns published, AI-generated blog posts for the public blog.
      responses:
        "200":
          description: List of published posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
  /admin/blog/ideas:
    post:
      operationId: generateBlogIdeas
      tags: [admin-blog]
      summary: Generate post-title ideas for a macrocategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogIdeasInput"
      responses:
        "200":
          description: Generated title ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogIdeasResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/blog/posts:
    get:
      operationId: listAdminPosts
      tags: [admin-blog]
      summary: List all generated posts
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    post:
      operationId: createBlogPost
      tags: [admin-blog]
      summary: Generate a draft blog post (not published)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Created draft post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/blog/posts/{id}:
    patch:
      operationId: updateBlogPost
      tags: [admin-blog]
      summary: Update a post (edit content, publish or unpublish)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlogPostInput"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    delete:
      operationId: deleteBlogPost
      tags: [admin-blog]
      summary: Delete a generated post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/blog/daily-runs:
    get:
      operationId: listBlogDailyRuns
      tags: [admin-blog]
      summary: Daily automatic post generation acceptance metrics
      responses:
        "200":
          description: Recent daily runs summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogDailyRunsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/psicologos:
    get:
      operationId: listAdminPsicologos
      tags: [admin-psychologist]
      summary: List all registered psychologists for admin verification
      responses:
        "200":
          description: List of psychologists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPsicologo"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/psicologos/{id}:
    get:
      operationId: getAdminPsicologo
      tags: [admin-psychologist]
      summary: Get full psychologist detail with activity log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Psychologist detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPsicologoDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    patch:
      operationId: updateAdminPsicologo
      tags: [admin-psychologist]
      summary: Update admin controls (active toggle, verified, CRP situation)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminPsicologoInput"
      responses:
        "200":
          description: Updated psychologist detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPsicologoDetail"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /psicologos:
    get:
      operationId: listPsicologos
      tags: [psychologist]
      summary: List public psychologists (paying and with a complete profile)
      description: Returns psychologists whose subscription is active and whose profile is complete.
      responses:
        "200":
          description: List of public psychologists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicPsicologo"
  /psicologos/contagem:
    get:
      operationId: contarPsicologos
      tags: [cadastro]
      summary: Count active, visible psychologists by area and location
      description: >-
        Returns counts of psychologists with an active subscription and a complete
        profile, optionally filtered by area, city and state. Used to show real
        competition numbers during the registration funnel.
      parameters:
        - name: area
          in: query
          required: false
          schema:
            type: string
        - name: cidade
          in: query
          required: false
          schema:
            type: string
        - name: uf
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Competition counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConcorrenciaResult"
  /cadastro/lead:
    post:
      operationId: upsertCadastroLead
      tags: [cadastro]
      summary: Create or update a registration lead
      description: >-
        Upserts the registration lead by leadId. Public (no auth): called on
        each funnel step to persist progress and enable remarketing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertCadastroLeadInput"
      responses:
        "200":
          description: Saved lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CadastroLead"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /cadastro/lead/{leadId}:
    get:
      operationId: getCadastroLead
      tags: [cadastro]
      summary: Get a registration lead by id
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lead found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CadastroLead"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /verificar-oab:
    post:
      operationId: verificarOab
      tags: [cadastro]
      summary: Verify a lawyer's OAB registration against the OAB Federal webservice
      description: >-
        Public (no auth): called at the end of funnel step 1. Looks up the CPF on
        the OAB CNA SOAP webservice (ConsultaAdvogadoPorCpf) and cross-checks the
        returned inscricao, name and status against the submitted data. Requires
        the OAB_CNA_KEY secret; without a valid key the OAB rejects the call and
        the response is motivo=erro_servico, so the funnel marks verification as
        pending for manual review.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificarOabInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificarOabResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "403":
          description: Forbidden origin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /perfil:
    get:
      operationId: getPerfil
      tags: [psychologist]
      summary: Get the authenticated psychologist's profile
      responses:
        "200":
          description: Current profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PsicologoProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    put:
      operationId: updatePerfil
      tags: [psychologist]
      summary: Create or update the authenticated psychologist's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PsicologoProfile"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /assinatura:
    get:
      operationId: getAssinatura
      tags: [subscription]
      summary: Get the current subscription state for the psychologist
      responses:
        "200":
          description: Current subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionState"
    post:
      operationId: createAssinatura
      tags: [subscription]
      summary: Start an Asaas Checkout to (re)subscribe the psychologist
      description: >-
        Creates an Asaas Checkout (hosted payment page, no company banner) for
        the authenticated psychologist and returns its URL. The recurring
        subscription is created by Asaas only after the payment is confirmed
        (CHECKOUT_PAID webhook); the account already exists, so nothing is
        provisioned here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionInput"
      responses:
        "201":
          description: Checkout started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Subscription already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Asaas error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /assinatura/cancelar:
    post:
      operationId: cancelAssinatura
      tags: [subscription]
      summary: Cancel the psychologist's subscription
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelSubscriptionInput"
      responses:
        "200":
          description: Subscription cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionState"
        "404":
          description: No subscription found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Asaas error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /assinatura/reembolso:
    post:
      operationId: solicitarReembolso
      tags: [subscription]
      summary: Request a 7-day withdrawal refund and delete the psychologist profile
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelSubscriptionInput"
      responses:
        "200":
          description: Refund processed and profile deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionState"
        "404":
          description: No subscription found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Refund window expired or no eligible payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Asaas error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /checkout:
    post:
      operationId: iniciarCheckout
      tags: [subscription]
      summary: Start an anonymous checkout (no account required)
      description: >-
        Public (no auth): called at the end of the registration funnel. Creates
        an Asaas Checkout (hosted payment page, no company banner) from the lead
        data and returns its URL, where the psychologist pays by card. NO account
        is created here, and the recurring subscription is created by Asaas only
        after the payment is confirmed (CHECKOUT_PAID webhook), which then
        provisions the account. Calling again always starts a fresh checkout
        instead of reopening a previous pending one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "201":
          description: Checkout started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Asaas error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "302":
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileTokenExchangeRequest"
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenExchangeSuccess"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
      responses:
        "200":
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, "null"]
          format: email
        firstName:
          type: [string, "null"]
        lastName:
          type: [string, "null"]
        profileImageUrl:
          type: [string, "null"]
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    BlogPostSection:
      type: object
      properties:
        heading:
          type: ["string", "null"]
        paragraphs:
          type: array
          items:
            type: string
      required:
        - paragraphs
    BlogPost:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        category:
          type: string
        subcategoria:
          type: string
          nullable: true
        title:
          type: string
        subtitle:
          type: string
        excerpt:
          type: string
        keywords:
          type: array
          items:
            type: string
        readingMinutes:
          type: integer
        body:
          type: array
          items:
            $ref: "#/components/schemas/BlogPostSection"
        bodyHtml:
          type: string
        crpClosing:
          type: string
        coverImageUrl:
          type: string
          nullable: true
        coverImageAlt:
          type: string
          nullable: true
        coverImageCredit:
          type: string
          nullable: true
        coverImageCreditUrl:
          type: string
          nullable: true
        published:
          type: boolean
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - category
        - title
        - subtitle
        - excerpt
        - keywords
        - readingMinutes
        - body
        - bodyHtml
        - crpClosing
        - published
        - createdAt
    BlogIdeasInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
      required:
        - category
    BlogIdeasResult:
      type: object
      properties:
        ideas:
          type: array
          items:
            type: string
      required:
        - ideas
    BlogPostInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
        theme:
          type: string
          minLength: 1
      required:
        - category
        - theme
    UpdateBlogPostInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
        subcategoria:
          type: string
          nullable: true
        title:
          type: string
          minLength: 1
        subtitle:
          type: string
        excerpt:
          type: string
        bodyHtml:
          type: string
        crpClosing:
          type: string
        published:
          type: boolean
      additionalProperties: false
    SubscriptionPayment:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          nullable: true
        description:
          type: string
        value:
          type: number
        status:
          type: string
          enum: [Pago, Pendente, Falhou]
        invoiceUrl:
          type: string
          nullable: true
      required:
        - id
        - description
        - value
        - status
    SubscriptionState:
      type: object
      properties:
        hasSubscription:
          type: boolean
        status:
          type: string
          enum: [pendente, ativa, atrasada, inativa]
          nullable: true
        plan:
          type: string
          enum: [mensal, anual]
          nullable: true
        value:
          type: number
          nullable: true
        cycle:
          type: string
          nullable: true
        customerName:
          type: string
          nullable: true
        nextDueDate:
          type: string
          nullable: true
        canceledAt:
          type: string
          nullable: true
        accessUntil:
          type: string
          nullable: true
        refundEligible:
          type: boolean
        invoiceUrl:
          type: string
          nullable: true
        payments:
