openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: blog
    description: Public blog operations
  - name: admin-blog
    description: Admin blog generation and management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /blog/posts:
    get:
      operationId: listPublishedPosts
      tags: [blog]
      summary: List published blog posts
      description: Returns published, AI-generated blog posts for the public blog.
      responses:
        "200":
          description: List of published posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
  /admin/blog/ideas:
    post:
      operationId: generateBlogIdeas
      tags: [admin-blog]
      summary: Generate post-title ideas for a macrocategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogIdeasInput"
      responses:
        "200":
          description: Generated title ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogIdeasResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/blog/posts:
    get:
      operationId: listAdminPosts
      tags: [admin-blog]
      summary: List all generated posts
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    post:
      operationId: createBlogPost
      tags: [admin-blog]
      summary: Generate and publish a blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/blog/posts/{id}:
    delete:
      operationId: deleteBlogPost
      tags: [admin-blog]
      summary: Delete a generated post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    BlogPostSection:
      type: object
      properties:
        heading:
          type: ["string", "null"]
        paragraphs:
          type: array
          items:
            type: string
      required:
        - paragraphs
    BlogPost:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        category:
          type: string
        title:
          type: string
        subtitle:
          type: string
        excerpt:
          type: string
        keywords:
          type: array
          items:
            type: string
        readingMinutes:
          type: integer
        body:
          type: array
          items:
            $ref: "#/components/schemas/BlogPostSection"
        oabClosing:
          type: string
        published:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - category
        - title
        - subtitle
        - excerpt
        - keywords
        - readingMinutes
        - body
        - oabClosing
        - published
        - createdAt
    BlogIdeasInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
      required:
        - category
    BlogIdeasResult:
      type: object
      properties:
        ideas:
          type: array
          items:
            type: string
      required:
        - ideas
    BlogPostInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
        theme:
          type: string
          minLength: 1
      required:
        - category
        - theme
