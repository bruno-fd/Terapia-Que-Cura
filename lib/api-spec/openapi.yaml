          type: string
        outro:
          type: string
        # Token de verificação do CRP assinado pelo servidor (emitido por
        # POST /verificar-oab quando valido=true — endpoint ainda não migrado
        # para o webservice do CRP, ver lib/oab.ts). O status "verificado" é
        # server-managed: o cliente NÃO grava crpVerificada diretamente, apenas
        # apresenta este token, que o servidor valida antes de marcar verificado.
        oabToken:
          type: string
          nullable: true
        # Sinaliza verificação pendente (revisão manual) quando o serviço do
        # CRP falhou. É o estado de MENOR privilégio, então pode vir do cliente.
        crpVerificacaoPendente:
          type: boolean
