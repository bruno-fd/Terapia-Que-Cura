openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: blog
    description: Public blog operations
  - name: admin-blog
    description: Admin blog generation and management
  - name: subscription
    description: Lawyer subscription billing via Asaas
  - name: lawyer
    description: Lawyer profile and public directory
  - name: cadastro
    description: Progressive lawyer registration funnel (lead capture)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /blog/posts:
    get:
      operationId: listPublishedPosts
      tags: [blog]
      summary: List published blog posts
      description: Returns published, AI-generated blog posts for the public blog.
      responses:
        "200":
          description: List of published posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
  /admin/blog/ideas:
    post:
      operationId: generateBlogIdeas
      tags: [admin-blog]
      summary: Generate post-title ideas for a macrocategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogIdeasInput"
      responses:
        "200":
          description: Generated title ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogIdeasResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/blog/posts:
    get:
      operationId: listAdminPosts
      tags: [admin-blog]
      summary: List all generated posts
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    post:
      operationId: createBlogPost
      tags: [admin-blog]
      summary: Generate a draft blog post (not published)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Created draft post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/blog/posts/{id}:
    patch:
      operationId: updateBlogPost
      tags: [admin-blog]
      summary: Update a post (edit content, publish or unpublish)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlogPostInput"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    delete:
      operationId: deleteBlogPost
      tags: [admin-blog]
      summary: Delete a generated post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /advogados:
    get:
      operationId: listAdvogados
      tags: [lawyer]
      summary: List public lawyers (paying and with a complete profile)
      description: Returns lawyers whose subscription is active and whose profile is complete.
      responses:
        "200":
          description: List of public lawyers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicLawyer"
  /advogados/contagem:
    get:
      operationId: contarAdvogados
      tags: [cadastro]
      summary: Count active, visible lawyers by area and location
      description: >-
        Returns counts of lawyers with an active subscription and a complete
        profile, optionally filtered by area, city and state. Used to show real
        competition numbers during the registration funnel.
      parameters:
        - name: area
          in: query
          required: false
          schema:
            type: string
        - name: cidade
          in: query
          required: false
          schema:
            type: string
        - name: uf
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Competition counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConcorrenciaResult"
  /cadastro/lead:
    post:
      operationId: upsertCadastroLead
      tags: [cadastro]
      summary: Create or update a registration lead
      description: >-
        Upserts the registration lead by leadId. Public (no auth): called on
        each funnel step to persist progress and enable remarketing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertCadastroLeadInput"
      responses:
        "200":
          description: Saved lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CadastroLead"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /cadastro/lead/{leadId}:
    get:
      operationId: getCadastroLead
      tags: [cadastro]
      summary: Get a registration lead by id
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lead found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CadastroLead"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /verificar-oab:
    post:
      operationId: verificarOab
      tags: [cadastro]
      summary: Verify a lawyer's OAB registration against the OAB Federal webservice
      description: >-
        Public (no auth): called at the end of funnel step 1. Looks up the CPF on
        the OAB CNA SOAP webservice (ConsultaAdvogadoPorCpf) and cross-checks the
        returned inscricao, name and status against the submitted data. Requires
        the OAB_CNA_KEY secret; without a valid key the OAB rejects the call and
        the response is motivo=erro_servico, so the funnel marks verification as
        pending for manual review.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificarOabInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificarOabResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "403":
          description: Forbidden origin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /perfil:
    get:
      operationId: getPerfil
      tags: [lawyer]
      summary: Get the authenticated lawyer's profile
      responses:
        "200":
          description: Current profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LawyerProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    put:
      operationId: updatePerfil
      tags: [lawyer]
      summary: Create or update the authenticated lawyer's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LawyerProfile"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /assinatura:
    get:
      operationId: getAssinatura
      tags: [subscription]
      summary: Get the current subscription state for the lawyer
      responses:
        "200":
          description: Current subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionState"
    post:
      operationId: createAssinatura
      tags: [subscription]
      summary: Create a subscription for the lawyer via Asaas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionInput"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionState"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Subscription already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Asaas error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /assinatura/cancelar:
    post:
      operationId: cancelAssinatura
      tags: [subscription]
      summary: Cancel the lawyer's subscription
      responses:
        "200":
          description: Subscription cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionState"
        "404":
          description: No subscription found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Asaas error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    BlogPostSection:
      type: object
      properties:
        heading:
          type: ["string", "null"]
        paragraphs:
          type: array
          items:
            type: string
      required:
        - paragraphs
    BlogPost:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        category:
          type: string
        title:
          type: string
        subtitle:
          type: string
        excerpt:
          type: string
        keywords:
          type: array
          items:
            type: string
        readingMinutes:
          type: integer
        body:
          type: array
          items:
            $ref: "#/components/schemas/BlogPostSection"
        bodyHtml:
          type: string
        oabClosing:
          type: string
        published:
          type: boolean
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - category
        - title
        - subtitle
        - excerpt
        - keywords
        - readingMinutes
        - body
        - bodyHtml
        - oabClosing
        - published
        - createdAt
    BlogIdeasInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
      required:
        - category
    BlogIdeasResult:
      type: object
      properties:
        ideas:
          type: array
          items:
            type: string
      required:
        - ideas
    BlogPostInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
        theme:
          type: string
          minLength: 1
      required:
        - category
        - theme
    UpdateBlogPostInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        subtitle:
          type: string
        excerpt:
          type: string
        bodyHtml:
          type: string
        oabClosing:
          type: string
        published:
          type: boolean
      additionalProperties: false
    SubscriptionPayment:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          nullable: true
        description:
          type: string
        value:
          type: number
        status:
          type: string
          enum: [Pago, Pendente, Falhou]
        invoiceUrl:
          type: string
          nullable: true
      required:
        - id
        - description
        - value
        - status
    SubscriptionState:
      type: object
      properties:
        hasSubscription:
          type: boolean
        status:
          type: string
          enum: [pendente, ativa, atrasada, inativa]
          nullable: true
        plan:
          type: string
          enum: [mensal, anual]
          nullable: true
        value:
          type: number
          nullable: true
        cycle:
          type: string
          nullable: true
        customerName:
          type: string
          nullable: true
        nextDueDate:
          type: string
          nullable: true
        canceledAt:
          type: string
          nullable: true
        accessUntil:
          type: string
          nullable: true
        invoiceUrl:
          type: string
          nullable: true
        payments:
          type: array
          items:
            $ref: "#/components/schemas/SubscriptionPayment"
      required:
        - hasSubscription
        - payments
    CreateSubscriptionInput:
      type: object
      properties:
        plano:
          type: string
          enum: [mensal, anual]
        nome:
          type: string
          minLength: 1
        cpfCnpj:
          type: string
          minLength: 1
        telefone:
          type: string
      required:
        - plano
        - nome
        - cpfCnpj
      additionalProperties: false
    Cidade:
      type: object
      properties:
        nome:
          type: string
          minLength: 1
        uf:
          type: string
          minLength: 2
          maxLength: 2
      required:
        - nome
        - uf
      additionalProperties: false
    LawyerProfile:
      type: object
      properties:
        nome:
          type: string
        oab:
          type: string
        photo:
          type: string
          nullable: true
        about:
          type: string
        areas:
          type: array
          items:
            type: string
        cidades:
          type: array
          items:
            $ref: "#/components/schemas/Cidade"
        atendeOnline:
          type: boolean
        whatsapp:
          type: string
        instagram:
          type: string
        linkedin:
          type: string
        website:
          type: string
        outro:
          type: string
        complete:
          type: boolean
        subscriptionStatus:
          type: string
          enum: [pendente, ativa, atrasada, inativa]
          nullable: true
        visivel:
          type: boolean
        oabVerificada:
          type: boolean
        oabSituacao:
          type: string
          nullable: true
        oabNomeConfirmado:
          type: string
          nullable: true
        oabVerificadaEm:
          type: string
          nullable: true
        oabVerificacaoPendente:
          type: boolean
        createdAt:
          type: string
          nullable: true
      required:
        - nome
        - oab
        - about
        - areas
        - cidades
        - atendeOnline
        - whatsapp
        - instagram
        - linkedin
        - website
        - outro
        - complete
        - visivel
        - oabVerificada
        - oabVerificacaoPendente
    UpdateProfileInput:
      type: object
      properties:
        nome:
          type: string
        oab:
          type: string
        photo:
          type: string
          nullable: true
        about:
          type: string
        areas:
          type: array
          items:
            type: string
        cidades:
          type: array
          items:
            $ref: "#/components/schemas/Cidade"
        atendeOnline:
          type: boolean
        whatsapp:
          type: string
        instagram:
          type: string
        linkedin:
          type: string
        website:
          type: string
        outro:
          type: string
        # Token de verificação da OAB assinado pelo servidor (emitido por
        # POST /verificar-oab quando valido=true). O status "verificado" é
        # server-managed: o cliente NÃO grava oabVerificada diretamente, apenas
        # apresenta este token, que o servidor valida antes de marcar verificado.
        oabToken:
          type: string
          nullable: true
        # Sinaliza verificação pendente (revisão manual) quando o serviço da OAB
        # falhou. É o estado de MENOR privilégio, então pode vir do cliente.
        oabVerificacaoPendente:
          type: boolean
      required:
        - nome
        - oab
        - about
        - areas
        - cidades
        - atendeOnline
        - whatsapp
        - instagram
        - linkedin
        - website
        - outro
      additionalProperties: false
    PublicLawyer:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        oab:
          type: string
        photo:
          type: string
          nullable: true
        about:
          type: string
        areas:
          type: array
          items:
            type: string
        cidades:
          type: array
          items:
            $ref: "#/components/schemas/Cidade"
        atendeOnline:
          type: boolean
        whatsapp:
          type: string
      required:
        - id
        - nome
        - oab
        - about
        - areas
        - cidades
        - atendeOnline
        - whatsapp
    ConcorrenciaResult:
      type: object
      properties:
        total:
          type: integer
        naArea:
          type: integer
        naCidade:
          type: integer
        naAreaECidade:
          type: integer
      required:
        - total
        - naArea
        - naCidade
        - naAreaECidade
    VerificarOabInput:
      type: object
      properties:
        cpf:
          type: string
        oab:
          type: string
        seccional:
          type: string
        nome:
          type: string
      required:
        - cpf
        - oab
        - seccional
        - nome
      additionalProperties: false
    VerificarOabResult:
      type: object
      properties:
        valido:
          type: boolean
        motivo:
          type: string
          enum:
            - cpf_nao_encontrado
            - oab_divergente
            - nome_divergente
            - inscricao_inativa
            - erro_servico
          nullable: true
        situacao:
          type: string
          nullable: true
        nomeOab:
          type: string
          nullable: true
        numeroOab:
          type: string
          nullable: true
        seccional:
          type: string
          nullable: true
        # Token assinado (HMAC) emitido quando valido=true. O cliente o guarda no
        # funil e o envia em PUT /perfil para o servidor gravar o status como
        # verificado de forma confiável (impede forjar oabVerificada).
        token:
          type: string
          nullable: true
      required:
        - valido
    CadastroLead:
      type: object
      properties:
        leadId:
          type: string
        nome:
          type: string
        email:
          type: string
        telefone:
          type: string
        plano:
          type: string
          enum: [mensal, anual]
          nullable: true
        areas:
          type: array
          items:
            type: string
        cidades:
          type: array
          items:
            $ref: "#/components/schemas/Cidade"
        atendeOnline:
          type: boolean
        step:
          type: integer
        completed:
          type: boolean
      required:
        - leadId
        - nome
        - email
        - telefone
        - areas
        - cidades
        - atendeOnline
        - step
        - completed
    UpsertCadastroLeadInput:
      type: object
      properties:
        leadId:
          type: string
          minLength: 1
        nome:
          type: string
        email:
          type: string
        telefone:
          type: string
        plano:
          type: string
          enum: [mensal, anual]
          nullable: true
        areas:
          type: array
          items:
            type: string
        cidades:
          type: array
          items:
            $ref: "#/components/schemas/Cidade"
        atendeOnline:
          type: boolean
        step:
          type: integer
        completed:
          type: boolean
      required:
        - leadId
      additionalProperties: false
