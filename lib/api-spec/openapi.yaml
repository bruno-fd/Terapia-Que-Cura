openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: blog
    description: Public blog operations
  - name: admin-blog
    description: Admin blog generation and management
  - name: subscription
    description: Lawyer subscription billing via Asaas
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /blog/posts:
    get:
      operationId: listPublishedPosts
      tags: [blog]
      summary: List published blog posts
      description: Returns published, AI-generated blog posts for the public blog.
      responses:
        "200":
          description: List of published posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
  /admin/blog/ideas:
    post:
      operationId: generateBlogIdeas
      tags: [admin-blog]
      summary: Generate post-title ideas for a macrocategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogIdeasInput"
      responses:
        "200":
          description: Generated title ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogIdeasResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/blog/posts:
    get:
      operationId: listAdminPosts
      tags: [admin-blog]
      summary: List all generated posts
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    post:
      operationId: createBlogPost
      tags: [admin-blog]
      summary: Generate a draft blog post (not published)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Created draft post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /admin/blog/posts/{id}:
    patch:
      operationId: updateBlogPost
      tags: [admin-blog]
      summary: Update a post (edit content, publish or unpublish)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlogPostInput"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    delete:
      operationId: deleteBlogPost
      tags: [admin-blog]
      summary: Delete a generated post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /assinatura:
    get:
      operationId: getAssinatura
      tags: [subscription]
      summary: Get the current subscription state for the lawyer
      responses:
        "200":
          description: Current subscription state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionState"
    post:
      operationId: createAssinatura
      tags: [subscription]
      summary: Create a subscription for the lawyer via Asaas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionInput"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionState"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Subscription already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Asaas error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /assinatura/cancelar:
    post:
      operationId: cancelAssinatura
      tags: [subscription]
      summary: Cancel the lawyer's subscription
      responses:
        "200":
          description: Subscription cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionState"
        "404":
          description: No subscription found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Asaas error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    BlogPostSection:
      type: object
      properties:
        heading:
          type: ["string", "null"]
        paragraphs:
          type: array
          items:
            type: string
      required:
        - paragraphs
    BlogPost:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        category:
          type: string
        title:
          type: string
        subtitle:
          type: string
        excerpt:
          type: string
        keywords:
          type: array
          items:
            type: string
        readingMinutes:
          type: integer
        body:
          type: array
          items:
            $ref: "#/components/schemas/BlogPostSection"
        bodyHtml:
          type: string
        oabClosing:
          type: string
        published:
          type: boolean
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - category
        - title
        - subtitle
        - excerpt
        - keywords
        - readingMinutes
        - body
        - bodyHtml
        - oabClosing
        - published
        - createdAt
    BlogIdeasInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
      required:
        - category
    BlogIdeasResult:
      type: object
      properties:
        ideas:
          type: array
          items:
            type: string
      required:
        - ideas
    BlogPostInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
        theme:
          type: string
          minLength: 1
      required:
        - category
        - theme
    UpdateBlogPostInput:
      type: object
      properties:
        category:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        subtitle:
          type: string
        excerpt:
          type: string
        bodyHtml:
          type: string
        oabClosing:
          type: string
        published:
          type: boolean
      additionalProperties: false
    SubscriptionPayment:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          nullable: true
        description:
          type: string
        value:
          type: number
        status:
          type: string
          enum: [Pago, Pendente, Falhou]
        invoiceUrl:
          type: string
          nullable: true
      required:
        - id
        - description
        - value
        - status
    SubscriptionState:
      type: object
      properties:
        hasSubscription:
          type: boolean
        status:
          type: string
          enum: [pendente, ativa, atrasada, inativa]
          nullable: true
        plan:
          type: string
          enum: [mensal, anual]
          nullable: true
        value:
          type: number
          nullable: true
        cycle:
          type: string
          nullable: true
        customerName:
          type: string
          nullable: true
        nextDueDate:
          type: string
          nullable: true
        invoiceUrl:
          type: string
          nullable: true
        payments:
          type: array
          items:
            $ref: "#/components/schemas/SubscriptionPayment"
      required:
        - hasSubscription
        - payments
    CreateSubscriptionInput:
      type: object
      properties:
        plano:
          type: string
          enum: [mensal, anual]
        nome:
          type: string
          minLength: 1
        cpfCnpj:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        telefone:
          type: string
      required:
        - plano
        - nome
        - cpfCnpj
        - email
      additionalProperties: false
